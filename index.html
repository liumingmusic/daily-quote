<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#faf7f2" />
  <meta name="description" content="每日一句 · 一句值得回味的话，配作者与出处。极简、有意境。" />
  <title>每日一句</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="card" id="card">
    <header class="topbar">
      <span id="dateLabel" class="date">——</span>
      <div class="top-actions">
        <button id="historyBtn" class="icon-btn" type="button">历史</button>
        <button id="favBtn" class="icon-btn" type="button" aria-label="我的收藏">★</button>
      </div>
    </header>

    <section class="quote-area">
      <span id="featuredBadge" class="badge hidden">今日精选</span>
      <blockquote class="quote-text" id="quoteText">正在为你取一句…</blockquote>
      <div class="quote-meta">
        <span id="quoteAuthor" class="author"></span>
        <span id="quoteFrom" class="from"></span>
      </div>
      <span id="quoteType" class="type-tag hidden"></span>
    </section>

    <footer class="actions">
      <button id="newBtn" class="primary-btn" type="button">换一句</button>
      <div class="secondary">
        <button id="favAddBtn" class="round-btn" type="button" aria-label="收藏这句" title="收藏">♥</button>
        <button id="copyBtn" class="round-btn" type="button" aria-label="复制" title="复制">⧉</button>
        <button id="shareBtn" class="round-btn" type="button" aria-label="分享" title="分享">↗</button>
      </div>
    </footer>
  </main>

  <!-- 历史回看 -->
  <div id="historyModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="历史回看">
    <div class="modal-panel">
      <div class="modal-head">
        <h2>历史回看</h2>
        <button class="close-btn" data-close="historyModal" type="button" aria-label="关闭">×</button>
      </div>
      <ul id="historyList" class="history-list"></ul>
    </div>
  </div>

  <!-- 收藏夹 -->
  <div id="favModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="我的收藏">
    <div class="modal-panel">
      <div class="modal-head">
        <h2>我的收藏</h2>
        <button class="close-btn" data-close="favModal" type="button" aria-label="关闭">×</button>
      </div>
      <ul id="favList" class="fav-list"></ul>
      <p id="favEmpty" class="empty-tip hidden">还没有收藏的句子，点击 ♥ 收藏喜欢的句子吧。</p>
    </div>
  </div>

  <div id="toast" class="toast hidden" aria-live="polite"></div>

  <script src="assets/js/app.js"></script>
</body>
</html>
